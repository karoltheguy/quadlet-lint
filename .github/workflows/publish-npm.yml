name: Publish to npm

# Publishes the quadlet-lint package (core + Monaco/service adapters + CLI) to
# the npm registry. Triggered when a GitHub Release is published, so the version
# is always a deliberate, semver-meaningful choice rather than a per-commit bump.
# The workflow_dispatch entry allows a manual re-run (e.g. retrying a release
# whose publish step failed) and requires the same release tag as input, so it
# checks out and verifies that exact tag rather than publishing an
# untagged/unreviewed state of whichever branch happens to be selected.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.2.3) — must match an existing GitHub Release and package.json version at that tag'
        required: true
        type: string

permissions:
  contents: read
  id-token: write # required for npm publish --provenance

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag input
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if ! [[ "$TAG_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag '$TAG_INPUT': expected a semver tag like v1.2.3." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0 # full history, needed for the git rev-list --count build number below

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # The published version is derived as <major>.<minor>.<commit-count>, the
      # same scheme the VS Code extension build uses, so both artifacts carry an
      # identical, auto-incrementing version. root package.json is the single
      # source of truth for <major>.<minor>; its committed patch is ignored.
      # The release tag only needs to agree on <major>.<minor>: bumping the base
      # (e.g. v0.2.0) is the deliberate signal to start a new minor line, while
      # the patch/build number advances automatically with each commit.
      - name: Derive and set version from base + commit count
        env:
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
        run: |
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          TAG_BASE=$(printf '%s' "$RELEASE_TAG" | sed -E 's/^v([0-9]+\.[0-9]+).*/\1/')
          if [ "$TAG_BASE" != "$BASE" ]; then
            echo "Release tag '$RELEASE_TAG' (base $TAG_BASE) does not match package.json base version '$BASE'." >&2
            echo "Bump <major>.<minor> in package.json and tag the release to match (e.g. v$BASE.0)." >&2
            exit 1
          fi
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="$BASE.$COMMIT_COUNT"
          echo "Publishing version $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # npm publish runs the package's prepublishOnly script
      # (typecheck + test + build), so the tarball is always gated and freshly
      # built from dist/. --provenance attaches a signed build attestation.
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
