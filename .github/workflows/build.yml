name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # manual re-run of the build + publish for the selected ref (use main)

permissions:
  contents: read
  id-token: write # required for npm publish --provenance

# Serialize entire workflow runs per-ref (not just the build job) so runs
# queue and publish in trigger order on main, instead of two builds racing
# to reach the publish step and finishing out of order. PR runs get their
# own group per-ref and never queue behind main, and stale PR runs are
# canceled on a new push; main runs are never canceled mid-publish.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: karoltheguy/quadlet-lint

  build:
    # Only starts once the test job has succeeded, so the npm module and the
    # VS Code extension .vsix are never built or published on a failing test run.
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, needed for git rev-list --count below

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org' # points npm publish at the public registry

      - name: Install dependencies
        run: npm ci

      - name: Build Core, Monaco, and CLI
        run: npm run build

      - name: Set shared build version
        # Both the npm package and the VS Code extension publish an identical
        # <major>.<minor>.<build> version. <major>.<minor> is the single source
        # of truth in the root package.json; <build> is the repo commit count, a
        # monotonic build number reproducible from the repo itself. Setting it on
        # the root package.json here means the packed tarball, the published npm
        # package, and the .vsix all carry the same version.
        run: |
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="$BASE.$COMMIT_COUNT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Package npm module (Monaco & CLI distribution)
        run: |
          npm pack
          mkdir -p build-artifacts
          mv quadlet-lint-*.tgz build-artifacts/

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: extensions/vscode

      - name: Build VS Code extension
        run: npm run build
        working-directory: extensions/vscode

      - name: Package VS Code extension (.vsix)
        run: |
          # Uses the shared VERSION (root major.minor + commit count) set above,
          # so the .vsix carries the exact same version as the npm package.
          cd extensions/vscode
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npx @vscode/vsce package --no-dependencies
          mv *.vsix ../../build-artifacts/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quadlet-lint-builds
          path: build-artifacts/
          if-no-files-found: error

      - name: Upgrade npm for trusted publishing
        # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 20 ships npm 10.
        # Done here rather than before the build so the build and npm ci above
        # keep running on the npm version pinned to the Node release.
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: npm install -g npm@latest

      - name: Publish to npm
        # Publishes on every push to main, the same trigger as the Marketplace
        # publish below. Skips if this exact version is already on npm, so
        # re-running the workflow on an unchanged commit is a no-op instead of a
        # failure. npm publish runs prepublishOnly (typecheck + test + build),
        # so the tarball is always freshly gated. Auth is npm trusted publishing
        # via the workflow's OIDC token (id-token: write above), so there is no
        # npm token secret; provenance is attached automatically.
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          if npm view "quadlet-lint@$VERSION" version >/dev/null 2>&1; then
            echo "quadlet-lint@$VERSION is already published; skipping."
          else
            npm publish --access public
          fi

      - name: Publish to VS Code Marketplace
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VSIX=$(ls build-artifacts/*.vsix)
          npx @vscode/vsce publish --packagePath "$VSIX" -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          VSIX=$(ls build-artifacts/*.vsix)
          npx ovsx publish "$VSIX" -p "$OVSX_PAT"
