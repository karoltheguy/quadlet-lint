name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        run: |
          VITEST_VERSION=$(node -p "require('vitest/package.json').version")
          npm install --no-save "@vitest/coverage-v8@$VITEST_VERSION"
          npx vitest run --coverage

      - name: Build Core, Monaco, and CLI
        run: npm run build

      - name: Package npm module (Monaco & CLI distribution)
        run: |
          npm pack
          mkdir -p build-artifacts
          mv quadlet-lint-*.tgz build-artifacts/

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: extensions/vscode

      - name: Build VS Code extension
        run: npm run build
        working-directory: extensions/vscode

      - name: Package VS Code extension (.vsix)
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          cd extensions/vscode
          # Derive the version as <major>.<minor> from package.json plus the
          # workflow run number as the build/patch component, so every build
          # produces a unique, increasing version (e.g. 0.0.1 -> 0.0.<run#>).
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          VERSION="$BASE.$RUN_NUMBER"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npx @vscode/vsce package --allow-missing-repository --no-dependencies
          mv *.vsix ../../build-artifacts/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quadlet-lint-builds
          path: build-artifacts/
          if-no-files-found: error
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: karoltheguy/quadlet-lint
